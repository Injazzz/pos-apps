[program:pos-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /path/to/laravel-pos/artisan queue:work --queue=broadcasts,default --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=2
redirect_stderr=true
stdout_logfile=/path/to/laravel-pos/storage/logs/worker.log
stopwaitsecs=3600
